services:
  # ============================================================
  # INFRASTRUCTURE
  # ============================================================
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.1
    container_name: alphawealth-redpanda
    command:
      - redpanda start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
    ports: ["19092:19092", "18082:18082"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 10

  redpanda-init:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.1
    container_name: alphawealth-redpanda-init
    depends_on: { redpanda: { condition: service_healthy } }
    entrypoint: /bin/bash
    command: |
      -c "
      rpk topic create ibkr.positions ibkr.account teller.balances banking.transactions --brokers redpanda:9092 -p 3 -r 1;
      rpk topic create net.worth.snapshots alerts.events sentiment.scores forecast.events --brokers redpanda:9092 -p 3 -r 1;
      echo 'All Kafka topics created'
      "
    restart: "no"

  postgres:
    image: timescale/timescaledb:2.16.1-pg16
    container_name: alphawealth-postgres
    environment:
      POSTGRES_DB: alphawealth
      POSTGRES_USER: alphatrade
      POSTGRES_PASSWORD: alphatrade123
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alphatrade"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: alphawealth-redis
    ports: ["6379:6379"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ============================================================
  # OLLAMA - Local LLM with GPU acceleration (RTX 2080 SUPER 8GB)
  # ============================================================
  ollama:
    image: ollama/ollama:latest
    container_name: alphawealth-ollama
    ports: ["11434:11434"]
    volumes:
      - ollama-data:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0
      OLLAMA_KEEP_ALIVE: 24h
      # 8GB can only hold 1 model at a time. Q5_K_M chosen for quality.
      OLLAMA_NUM_PARALLEL: 1
      OLLAMA_MAX_LOADED_MODELS: 1
    restart: unless-stopped
    healthcheck:
      # Ollama doesn't expose /health - /api/tags is the canonical liveness probe
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  ollama-init:
    image: ollama/ollama:latest
    container_name: alphawealth-ollama-init
    depends_on: { ollama: { condition: service_healthy } }
    entrypoint: /bin/sh
    command: |
      -c "
      echo 'Pulling Llama 3.1 8B Q5_K_M for chat (5.7GB, fits in 8GB VRAM)';
      OLLAMA_HOST=ollama:11434 ollama pull llama3.1:8b-instruct-q5_K_M;
      echo 'Pulling Mistral 7B Q4 as backup (4.4GB)';
      OLLAMA_HOST=ollama:11434 ollama pull mistral:7b-instruct-q4_K_M;
      echo 'Models ready';
      OLLAMA_HOST=ollama:11434 ollama list;
      "
    restart: "no"

  # ============================================================
  # ANALYTICS & RESEARCH
  # ============================================================
  model-svc:
    build: { context: ., dockerfile: python-research/Dockerfile }
    container_name: alphawealth-model-svc
    ports: ["8090:8090"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health')\" >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  analysis-svc:
    build: { context: ., dockerfile: modules/analysis-svc/Dockerfile }
    container_name: alphawealth-analysis
    ports: ["8088:8088"]
    environment:
      MARKETDATA_URL: http://live-data-svc:8096
      MODEL_INFERENCE_URL: http://model-svc:8090
      CPP_ENGINE_URL: http://cpp-signal-engine:9000
      CPP_ZMQ_URL: tcp://cpp-signal-engine:5555
      DB_URL: jdbc:postgresql://postgres:5432/alphawealth
      DB_USER: alphatrade
      DB_PASS: alphatrade123
      API_TOKEN: ${API_TOKEN:-}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-*}
    depends_on:
      postgres: { condition: service_healthy }
      live-data-svc: { condition: service_started }
      cpp-signal-engine: { condition: service_started }
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8088/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s

  backtest-svc:
    build: { context: ., dockerfile: modules/backtest-svc/Dockerfile }
    container_name: alphawealth-backtest
    ports: ["8089:8089"]
    environment:
      MARKETDATA_URL: http://live-data-svc:8096
      ANALYSIS_URL: http://analysis-svc:8088
      API_TOKEN: ${API_TOKEN:-}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-*}
    depends_on: { live-data-svc: { condition: service_started } }
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8089/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # FinBERT sentiment (GPU-accelerated)
  sentiment-svc:
    build: { context: ./modules/sentiment-svc, dockerfile: Dockerfile }
    container_name: alphawealth-sentiment
    ports: ["8097:8097"]
    environment:
      LIVE_DATA_URL: http://live-data-svc:8096
      FINBERT_MODEL: ProsusAI/finbert
      USE_CUDA: "auto"
      API_TOKEN: ${API_TOKEN:-}
    depends_on: [live-data-svc]
    restart: unless-stopped
    # FinBERT downloads ~430MB model on first start; allow generous start_period
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8097/health')\" >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 180s

  # FinGPT-Forecaster (GPU-accelerated)
  fingpt-svc:
    build: { context: ./modules/fingpt-svc, dockerfile: Dockerfile }
    container_name: alphawealth-fingpt
    ports: ["8098:8098"]
    environment:
      LIVE_DATA_URL: http://live-data-svc:8096
      SENTIMENT_URL: http://sentiment-svc:8097
      FINGPT_MODEL: FinGPT/fingpt-forecaster_dow30_llama2-7b_lora
      FINGPT_BASE: NousResearch/Llama-2-7b-chat-hf
      QUANTIZATION: "4bit"
      MAX_VRAM_GB: 6
      HF_TOKEN: ${HF_TOKEN:-}
      API_TOKEN: ${API_TOKEN:-}
    volumes:
      - hf-cache:/root/.cache/huggingface
    depends_on: [live-data-svc, sentiment-svc]
    restart: unless-stopped
    # /health responds even before model is loaded (lazy-loads on first /forecast)
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8098/health')\" >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # ============================================================
  # ALPHAWEALTH CORE SERVICES
  # ============================================================
  live-data-svc:
    build: { context: ./modules/live-data-svc, dockerfile: Dockerfile }
    container_name: alphawealth-live-data
    ports: ["8096:8096"]
    environment:
      API_TOKEN: ${API_TOKEN:-}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      KAFKA_BOOTSTRAP: redpanda:9092
      PANDAPROXY_URL: http://redpanda:8082
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: alphawealth
      DB_USER: alphatrade
      DB_PASSWORD: ${DB_PASSWORD:-alphatrade123}
    depends_on:
      postgres:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8096/health')\" >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  ibkr-sync-svc:
    build: { context: ., dockerfile: modules/ibkr-sync-svc/Dockerfile }
    container_name: alphawealth-ibkr-sync
    ports: ["8091:8091"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ibkr_data:/data
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/alphawealth
      DB_USER: alphatrade
      DB_PASSWORD: alphatrade123
      KAFKA_BOOTSTRAP: redpanda:9092
      IBKR_CP_GATEWAY_URL: ${IBKR_CP_GATEWAY_URL:-https://host.docker.internal:5001}
      IBKR_PUBLIC_LOGIN_URL: ${IBKR_PUBLIC_LOGIN_URL:-https://localhost:5001}
      IBKR_SNAPSHOT_PATH: /data/ibkr-snapshot.json
      API_TOKEN: ${API_TOKEN:-}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-*}
    depends_on:
      postgres: { condition: service_healthy }
      redpanda-init: { condition: service_completed_successfully }
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8091/ibkr/status || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  teller-banking-svc:
    build: { context: ., dockerfile: modules/teller-banking-svc/Dockerfile }
    container_name: alphawealth-teller
    ports: ["8092:8092"]
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/alphawealth
      DB_USER: alphatrade
      DB_PASSWORD: alphatrade123
      KAFKA_BOOTSTRAP: redpanda:9092
      TELLER_APP_ID: ${TELLER_APP_ID:-}
      TELLER_ENV: ${TELLER_ENV:-sandbox}
      TELLER_CERT_PATH: ${TELLER_CERT_PATH:-/certs/certificate.pem}
      TELLER_KEY_PATH: ${TELLER_KEY_PATH:-/certs/private_key.pem}
      TELLER_ENROLLMENTS_PATH: /data/teller-enrollments.json
      API_TOKEN: ${API_TOKEN:-}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-*}
    volumes:
      - ./secrets/teller:/certs:ro
      - banking_data:/data
    depends_on:
      postgres: { condition: service_healthy }
      redpanda-init: { condition: service_completed_successfully }
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8092/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  net-worth-svc:
    build: { context: ., dockerfile: modules/net-worth-svc/Dockerfile }
    container_name: alphawealth-net-worth
    ports: ["8093:8093"]
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/alphawealth
      DB_USER: alphatrade
      DB_PASSWORD: alphatrade123
      KAFKA_BOOTSTRAP: redpanda:9092
      API_TOKEN: ${API_TOKEN:-}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-*}
    depends_on:
      postgres: { condition: service_healthy }
      redpanda-init: { condition: service_completed_successfully }
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8093/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  ai-advisor-svc:
    build: { context: ., dockerfile: modules/ai-advisor-svc/Dockerfile }
    container_name: alphawealth-ai-advisor
    ports: ["8094:8094"]
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-auto}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b-instruct-q5_K_M}
      NET_WORTH_URL: http://net-worth-svc:8093
      IBKR_URL: http://ibkr-sync-svc:8091
      TELLER_URL: http://teller-banking-svc:8092
      ANALYSIS_URL: http://analysis-svc:8088
      SENTIMENT_URL: http://sentiment-svc:8097
      FINGPT_URL: http://fingpt-svc:8098
      LIVE_DATA_URL: http://live-data-svc:8096
      CPP_ENGINE_URL: http://cpp-signal-engine:9000
      API_TOKEN: ${API_TOKEN:-}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-*}
    depends_on:
      net-worth-svc: { condition: service_started }
      analysis-svc: { condition: service_started }
      live-data-svc: { condition: service_started }
      cpp-signal-engine: { condition: service_started }
      ollama: { condition: service_started }
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8094/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  alerts-svc:
    build: { context: ., dockerfile: modules/alerts-svc/Dockerfile }
    container_name: alphawealth-alerts
    ports: ["8095:8095"]
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/alphawealth
      DB_USER: alphatrade
      DB_PASSWORD: alphatrade123
      KAFKA_BOOTSTRAP: redpanda:9092
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      ALERT_FROM_EMAIL: ${ALERT_FROM_EMAIL:-alerts@alphawealth.app}
      ALERT_TO_EMAIL: ${ALERT_TO_EMAIL:-}
      API_TOKEN: ${API_TOKEN:-}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-*}
    depends_on:
      postgres: { condition: service_healthy }
      redpanda-init: { condition: service_completed_successfully }
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8095/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  cpp-signal-engine:
    build: { context: ./cpp-native/technical-signal-engine, dockerfile: Dockerfile }
    container_name: alphawealth-cpp-signal
    ports: ["9000:9000", "5555:5555"]
    restart: unless-stopped
    # Dockerfile already has HEALTHCHECK; this overrides for compose-level visibility
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:9000/health || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 10s

  # ============================================================
  # OBSERVABILITY
  # ============================================================
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: alphawealth-prometheus
    ports: ["9090:9090"]
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  grafana:
    image: grafana/grafana:11.1.0
    container_name: alphawealth-grafana
    ports: ["3001:3000"]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on: [prometheus]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ============================================================
  # UI
  # ============================================================
  ui:
    build: { context: ./ui, dockerfile: Dockerfile }
    container_name: alphawealth-ui
    ports: ["3000:80"]
    environment:
      VITE_LIVE_DATA_URL:  http://localhost:8096
      VITE_ANALYSIS_URL:   http://localhost:8088
      VITE_BACKTEST_URL:   http://localhost:8089
      VITE_AI_ADVISOR_URL: http://localhost:8094
      VITE_NET_WORTH_URL:  http://localhost:8093
      VITE_IBKR_URL:       http://localhost:8091
      VITE_TELLER_URL:     http://localhost:8092
      VITE_SENTIMENT_URL:  http://localhost:8097
      VITE_FINGPT_URL:     http://localhost:8098
      VITE_ALERTS_URL:     http://localhost:8095
    depends_on:
      - live-data-svc
      - net-worth-svc
      - analysis-svc
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  pgdata:
  grafana-data:
  ollama-data:
  hf-cache:
  ibkr_data:
  banking_data:
