global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  # Java Spring Boot services expose Micrometer metrics at /actuator/prometheus
  - job_name: alphawealth-java
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - analysis-svc:8088
          - backtest-svc:8089
          - ibkr-sync-svc:8091
          - teller-banking-svc:8092
          - net-worth-svc:8093
          - ai-advisor-svc:8094
          - alerts-svc:8095

  # Python FastAPI services expose metrics at /metrics
  # (prometheus-fastapi-instrumentator)
  - job_name: alphawealth-python
    metrics_path: /metrics
    static_configs:
      - targets:
          - live-data-svc:8096
          - sentiment-svc:8097
          - fingpt-svc:8098
