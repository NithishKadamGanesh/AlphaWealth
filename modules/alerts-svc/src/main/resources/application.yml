spring:
  application:
    name: alerts-svc
  datasource:
    url: ${DB_URL:jdbc:postgresql://timescaledb:5432/alphawealth}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:redpanda:9092}
    consumer:
      group-id: alerts-svc
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: latest

server:
  port: 8095

resend:
  api-key: ${RESEND_API_KEY:}
  from:    ${ALERT_FROM_EMAIL:alerts@alphawealth.app}

alert:
  to: ${ALERT_TO_EMAIL:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    com.alphatrade.alerts: INFO
