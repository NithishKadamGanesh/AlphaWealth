spring:
  application:
    name: teller-banking-svc
  datasource:
    url: ${DB_URL:jdbc:postgresql://timescaledb:5432/alphawealth}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:redpanda:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

server:
  port: 8092

teller:
  app-id:    ${TELLER_APP_ID:}
  cert-path: ${TELLER_CERT_PATH:/certs/certificate.pem}
  key-path:  ${TELLER_KEY_PATH:/certs/private_key.pem}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    com.alphatrade.teller: INFO
