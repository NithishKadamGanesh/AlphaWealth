spring:
  application:
    name: ibkr-sync-svc
  datasource:
    url: ${DB_URL:jdbc:postgresql://timescaledb:5432/alphawealth}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:redpanda:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3

server:
  port: 8091

ibkr:
  cp-gateway-url:        ${IBKR_CP_GATEWAY_URL:https://host.docker.internal:5001}
  public-login-url:      ${IBKR_PUBLIC_LOGIN_URL:https://localhost:5001}
  sync-interval-seconds: ${IBKR_SYNC_INTERVAL:30}
  snapshot-path:         ${IBKR_SNAPSHOT_PATH:/data/ibkr-snapshot.json}
  request-timeout-seconds: ${IBKR_REQUEST_TIMEOUT_SECONDS:10}
  status-refresh-seconds: ${IBKR_STATUS_REFRESH_SECONDS:8}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.alphatrade.ibkr: INFO
