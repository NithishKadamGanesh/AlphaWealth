server:
  port: 8089

spring:
  application:
    name: backtest-svc

# marketdata.url - now points to live-data-svc (yfinance bridge endpoints)
# Accepts MARKETDATA_URL or MARKET_DATA_URL env var
marketdata:
  url: ${MARKETDATA_URL:${MARKET_DATA_URL:http://localhost:8096}}

analysis:
  url: ${ANALYSIS_URL:http://localhost:8088}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
