server:
  port: 8084

spring:
  application:
    name: portfolio-svc
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:19092}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/alphatrade}
    username: ${DB_USER:alphatrade}
    password: ${DB_PASS:alphatrade123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
