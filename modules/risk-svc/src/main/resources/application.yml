server:
  port: 8082

spring:
  application:
    name: risk-svc
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:19092}

risk:
  max-qty: 100000
  max-notional: 10000000
  fat-finger-pct: 20
  max-orders-per-second: 50
  cleanup-interval-ms: 300000
  cleanup-initial-delay-ms: 60000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
