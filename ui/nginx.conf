server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy the IBKR Client Portal gateway through the UI origin so the browser
    # can complete login without bouncing between unrelated localhost ports.
    location /ibkr-portal/ {
        proxy_pass          https://host.docker.internal:5001/;
        proxy_ssl_verify    off;

        proxy_set_header    Host              localhost:5001;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    Cookie            $http_cookie;
        proxy_pass_header   Set-Cookie;

        proxy_redirect      https://host.docker.internal:5001/ /ibkr-portal/;
        proxy_redirect      https://localhost:5001/            /ibkr-portal/;

        proxy_hide_header   X-Frame-Options;
        proxy_hide_header   Content-Security-Policy;

        proxy_buffer_size        128k;
        proxy_buffers            8 256k;
        proxy_busy_buffers_size  256k;
    }

    # The IBKR gateway redirects login to root-relative /sso/* routes.
    # Proxy those too or the SPA will accidentally swallow the login flow.
    location /sso/ {
        proxy_pass          https://host.docker.internal:5001/sso/;
        proxy_ssl_verify    off;

        proxy_set_header    Host              localhost:5001;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    Cookie            $http_cookie;
        proxy_pass_header   Set-Cookie;

        proxy_redirect      https://host.docker.internal:5001/sso/ /sso/;
        proxy_redirect      https://localhost:5001/sso/            /sso/;

        proxy_hide_header   X-Frame-Options;
        proxy_hide_header   Content-Security-Policy;

        proxy_buffer_size        128k;
        proxy_buffers            8 256k;
        proxy_busy_buffers_size  256k;
    }

    # React SPA — all other paths
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;
}
