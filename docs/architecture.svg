    <path d="M560,372 C560,520 720,560 770,598" fill="none" stroke="#C2255C" stroke-width="2" marker-end="url(#aMag)"/>
    <path d="M860,598 C860,560 600,540 560,448" fill="none" stroke="#C2255C" stroke-width="1.8" stroke-dasharray="2 5" marker-end="url(#aMag)"/>

    <!-- External providers -->
    <rect x="1110" y="250" width="170" height="468" rx="14" fill="none" stroke="#E8590C" stroke-width="2" stroke-dasharray="9 7"/>
    <rect x="1128" y="300" width="134" height="38" rx="8" fill="#FFF0E6" stroke="#E8590C" stroke-width="2"/>
    <rect x="1128" y="352" width="134" height="38" rx="8" fill="#FFF0E6" stroke="#E8590C" stroke-width="2"/>
    <rect x="1128" y="404" width="134" height="38" rx="8" fill="#FFF0E6" stroke="#E8590C" stroke-width="2"/>
    <rect x="1128" y="456" width="134" height="38" rx="8" fill="#FFF0E6" stroke="#E8590C" stroke-width="2"/>
    <rect x="1128" y="520" width="134" height="38" rx="8" fill="#FFF0E6" stroke="#E8590C" stroke-width="2"/>
    <rect x="1128" y="572" width="134" height="38" rx="8" fill="#FFF0E6" stroke="#E8590C" stroke-width="2"/>
    <rect x="1128" y="624" width="134" height="38" rx="8" fill="#FFF0E6" stroke="#E8590C" stroke-width="2"/>
