    <path d="M638,820 C500,840 980,470 1006,450" fill="none" stroke="#0C8599" stroke-width="0"/>

    <!-- legend box -->
    <rect x="1010" y="788" width="270" height="124" rx="10" fill="#FFFFFF" stroke="#868E96" stroke-width="1.6"/>
    <line x1="1028" y1="816" x2="1066" y2="816" stroke="#1C6FBF" stroke-width="2" marker-end="url(#aBlue)"/>
    <line x1="1028" y1="842" x2="1066" y2="842" stroke="#2F9E44" stroke-width="2" marker-end="url(#aGreen)"/>
    <line x1="1028" y1="868" x2="1066" y2="868" stroke="#C2255C" stroke-width="2" stroke-dasharray="2 4" marker-end="url(#aMag)"/>
