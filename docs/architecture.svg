    <text x="875" y="676" text-anchor="middle" font-size="12.5" fill="#7A2447">options pricing / IV / strategy screening · backtest · portfolio risk</text>
    <text x="875" y="700" text-anchor="middle" font-size="12" fill="#A33" >HTTP :9000  ·  ZMQ signal stream :5555 → analysis-svc</text>

    <!-- External providers -->
    <text x="1195" y="278" text-anchor="middle" font-size="16" font-weight="bold" fill="#E8590C">External Providers</text>
    <text x="1195" y="324" text-anchor="middle" font-size="13" font-weight="bold">IBKR</text>
    <text x="1195" y="376" text-anchor="middle" font-size="13" font-weight="bold">Teller</text>
    <text x="1195" y="428" text-anchor="middle" font-size="13" font-weight="bold">Yahoo Finance</text>
    <text x="1195" y="480" text-anchor="middle" font-size="13" font-weight="bold">Finnhub (news)</text>
