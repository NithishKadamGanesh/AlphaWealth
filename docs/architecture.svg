    <text x="135" y="816" text-anchor="middle" font-size="12.5" font-weight="bold">Redpanda</text><text x="135" y="833" text-anchor="middle" font-size="10.5" fill="#5C6370">Kafka event bus</text>
    <text x="304" y="816" text-anchor="middle" font-size="12.5" font-weight="bold">TimescaleDB</text><text x="304" y="833" text-anchor="middle" font-size="10.5" fill="#5C6370">Postgres · durable data</text>
    <text x="473" y="814" text-anchor="middle" font-size="12.5" font-weight="bold">Redis</text><text x="473" y="831" text-anchor="middle" font-size="10" fill="#5C6370">cache · provisioned</text><text x="473" y="845" text-anchor="middle" font-size="9.5" fill="#A33">(not yet wired)</text>
    <text x="638" y="816" text-anchor="middle" font-size="12.5" font-weight="bold">Ollama</text><text x="638" y="833" text-anchor="middle" font-size="10.5" fill="#5C6370">Llama 3.1 · local LLM</text>
    <text x="803" y="816" text-anchor="middle" font-size="12.5" font-weight="bold">Prometheus</text><text x="803" y="833" text-anchor="middle" font-size="10.5" fill="#5C6370">metrics</text>
    <text x="968" y="816" text-anchor="middle" font-size="12.5" font-weight="bold">Grafana</text><text x="968" y="833" text-anchor="middle" font-size="10.5" fill="#5C6370">dashboards</text>

    <!-- legend -->
    <text x="1075" y="820" font-size="11.5">data / events</text>
    <text x="1075" y="846" font-size="11.5">service / logic flow</text>
    <text x="1075" y="872" font-size="11.5">C++ HTTP + ZMQ stream</text>
    <text x="1075" y="898" font-size="11.5">external feeds / LLMs</text>
