    <path d="M58,200 q20,-28 40,0" fill="#F0EBFB" stroke="#6741D9" stroke-width="2"/>
    <line x1="105" y1="178" x2="195" y2="172" stroke="#6741D9" stroke-width="2" marker-end="url(#aPurple)"/>

    <!-- UI box -->
    <rect x="205" y="120" width="690" height="82" rx="12" fill="#F0EBFB" stroke="#6741D9" stroke-width="2.5"/>

    <!-- UI -> groups -->
    <line x1="360" y1="202" x2="340" y2="248" stroke="#1C6FBF" stroke-width="2" marker-end="url(#aBlue)"/>
    <line x1="740" y1="202" x2="800" y2="248" stroke="#1C6FBF" stroke-width="2" marker-end="url(#aBlue)"/>

    <!-- Java group container -->
    <rect x="40" y="250" width="600" height="300" rx="14" fill="none" stroke="#1C6FBF" stroke-width="2" stroke-dasharray="9 7"/>
    <!-- java services -->
    <rect x="60"  y="322" width="132" height="50" rx="9" fill="#E7F0FB" stroke="#1C6FBF" stroke-width="2"/>
    <rect x="204" y="322" width="132" height="50" rx="9" fill="#E7F0FB" stroke="#1C6FBF" stroke-width="2"/>
    <rect x="348" y="322" width="138" height="50" rx="9" fill="#E7F0FB" stroke="#1C6FBF" stroke-width="2"/>
    <rect x="498" y="322" width="124" height="50" rx="9" fill="#E7F0FB" stroke="#1C6FBF" stroke-width="2.5"/>
    <rect x="60"  y="398" width="132" height="50" rx="9" fill="#E7F0FB" stroke="#1C6FBF" stroke-width="2"/>
    <rect x="204" y="398" width="132" height="50" rx="9" fill="#E7F0FB" stroke="#1C6FBF" stroke-width="2"/>
    <rect x="348" y="398" width="138" height="50" rx="9" fill="#E7F0FB" stroke="#1C6FBF" stroke-width="2"/>
    <!-- RAG sticky -->
    <rect x="60" y="466" width="426" height="70" rx="6" fill="#FFF3BF" stroke="#E6B800" stroke-width="2"/>

    <!-- Python group container -->
    <rect x="660" y="250" width="430" height="300" rx="14" fill="none" stroke="#2F9E44" stroke-width="2" stroke-dasharray="9 7"/>
    <rect x="680" y="322" width="190" height="50" rx="9" fill="#E8F7EC" stroke="#2F9E44" stroke-width="2"/>
    <rect x="884" y="322" width="186" height="50" rx="9" fill="#E8F7EC" stroke="#2F9E44" stroke-width="2"/>
    <rect x="680" y="398" width="190" height="50" rx="9" fill="#E8F7EC" stroke="#2F9E44" stroke-width="2"/>
    <rect x="884" y="398" width="186" height="50" rx="9" fill="#E8F7EC" stroke="#2F9E44" stroke-width="2"/>

