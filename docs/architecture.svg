  <!-- ===================== TEXT (crisp) ===================== -->
  <g fill="#1F2933">
    <text x="650" y="56" text-anchor="middle" font-size="36" font-weight="bold">AlphaWealth — System Architecture</text>
    <text x="650" y="88" text-anchor="middle" font-size="17" fill="#6B7280">Self-hosted personal finance + market-intelligence platform · monitoring only, no trade execution</text>

    <text x="1144" y="44" font-size="13" fill="#6741D9">📊 Monitoring &amp; analytics only —</text>
    <text x="1144" y="62" font-size="13" fill="#6741D9">no orders are ever placed</text>

    <text x="78" y="142" text-anchor="middle" font-size="16" fill="#6741D9" font-weight="bold">User</text>

    <text x="550" y="155" text-anchor="middle" font-size="24" font-weight="bold" fill="#6741D9">React + Vite UI</text>
    <text x="550" y="184" text-anchor="middle" font-size="13" fill="#5B4BB0">Dashboard · Net Worth · Portfolio · Markets · Banking · Opportunities · AI Advisor · FIRE · Settings</text>

    <!-- Java group -->
    <text x="340" y="278" text-anchor="middle" font-size="19" font-weight="bold" fill="#1C6FBF">Core Java Microservices</text>
    <text x="340" y="300" text-anchor="middle" font-size="12.5" fill="#5C6370">Spring Boot · the control layer (REST, orchestration, business logic)</text>
    <text x="126" y="344" text-anchor="middle" font-size="12.5" font-weight="bold">net-worth-svc</text><text x="126" y="361" text-anchor="middle" font-size="10.5" fill="#5C6370">:8093</text>
    <text x="270" y="344" text-anchor="middle" font-size="12.5" font-weight="bold">ibkr-sync-svc</text><text x="270" y="361" text-anchor="middle" font-size="10.5" fill="#5C6370">:8091</text>
    <text x="417" y="344" text-anchor="middle" font-size="12.5" font-weight="bold">teller-banking</text><text x="417" y="361" text-anchor="middle" font-size="10.5" fill="#5C6370">:8092</text>
    <text x="560" y="344" text-anchor="middle" font-size="12.5" font-weight="bold">analysis-svc</text><text x="560" y="361" text-anchor="middle" font-size="10.5" fill="#5C6370">:8088 · C++ gateway</text>
    <text x="126" y="420" text-anchor="middle" font-size="12.5" font-weight="bold">backtest-svc</text><text x="126" y="437" text-anchor="middle" font-size="10.5" fill="#5C6370">:8089</text>
    <text x="270" y="420" text-anchor="middle" font-size="12.5" font-weight="bold">ai-advisor-svc</text><text x="270" y="437" text-anchor="middle" font-size="10.5" fill="#5C6370">:8094 · RAG</text>
    <text x="417" y="420" text-anchor="middle" font-size="12.5" font-weight="bold">alerts-svc</text><text x="417" y="437" text-anchor="middle" font-size="10.5" fill="#5C6370">:8095</text>
    <text x="273" y="488" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#8A6D00">RAG context builder</text>
    <text x="273" y="506" text-anchor="middle" font-size="10.5" fill="#7A6000">portfolio · banking · net worth · analysis</text>
    <text x="273" y="522" text-anchor="middle" font-size="10.5" fill="#7A6000">sentiment · C++ regime · FinGPT forecasts</text>

    <!-- Python group -->
    <text x="875" y="278" text-anchor="middle" font-size="19" font-weight="bold" fill="#2F9E44">Python AI / Data Services</text>
    <text x="875" y="300" text-anchor="middle" font-size="12.5" fill="#5C6370">Python · GPU · the lab (data ingestion, NLP, ML)</text>
    <text x="775" y="344" text-anchor="middle" font-size="12.5" font-weight="bold">live-data-svc</text><text x="775" y="361" text-anchor="middle" font-size="10.5" fill="#5C6370">:8096 · quotes·history·news</text>
    <text x="977" y="344" text-anchor="middle" font-size="12.5" font-weight="bold">sentiment-svc</text><text x="977" y="361" text-anchor="middle" font-size="10.5" fill="#5C6370">:8097 · FinBERT (GPU)</text>
    <text x="775" y="420" text-anchor="middle" font-size="12.5" font-weight="bold">fingpt-svc</text><text x="775" y="437" text-anchor="middle" font-size="10.5" fill="#5C6370">:8098 · forecaster (GPU)</text>
    <text x="977" y="420" text-anchor="middle" font-size="12.5" font-weight="bold">model-svc</text><text x="977" y="437" text-anchor="middle" font-size="10.5" fill="#5C6370">:8090 · research / ML</text>

    <!-- C++ engine -->
