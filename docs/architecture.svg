<svg viewBox="0 0 1300 960" xmlns="http://www.w3.org/2000/svg" font-family="'Comic Sans MS','Comic Neue','Segoe Print','Bradley Hand','Chalkboard SE',cursive">
  <defs>
    <filter id="rough" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="2" seed="11" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="2.3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <marker id="aBlue" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#1C6FBF"/></marker>
    <marker id="aGreen" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2F9E44"/></marker>
    <marker id="aMag" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#C2255C"/></marker>
    <marker id="aBlack" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#343A40"/></marker>
    <marker id="aPurple" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#6741D9"/></marker>
  </defs>

  <rect x="0" y="0" width="1300" height="960" fill="#FBFBF6"/>

