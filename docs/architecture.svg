    <line x1="300" y1="668" x2="300" y2="668" stroke="#1C6FBF" stroke-width="0"/>
    <line x1="770" y1="718" x2="500" y2="786" stroke="#1C6FBF" stroke-width="2" marker-end="url(#aBlue)"/>
    <line x1="980" y1="448" x2="980" y2="786" stroke="#1C6FBF" stroke-width="1.6" stroke-dasharray="2 5" marker-end="url(#aBlue)"/>
